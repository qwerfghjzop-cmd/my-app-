<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Tasks - 과제 관리</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap");

    :root {
      --bg: #2d1553;
      --card: #3c1f66;
      --card-2: #4d2a7f;
      --muted: #d5c6f0;
      --text: #fffaf0;
      --accent: #ffd84f;
      --accent-2: #f8c52b;
      --danger: #ff8ca2;
      --ok: #88e7c4;
      --warn: #ffe07f;
      --line: #6f4aa8;
      --user-bg: none;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Nunito", "Noto Sans KR", sans-serif;
      background-image:
        linear-gradient(rgba(20, 6, 37, .45), rgba(20, 6, 37, .45)),
        var(--user-bg),
        radial-gradient(circle at 15% 10%, #6f3fb1 0%, transparent 28%),
        radial-gradient(circle at 90% 12%, #f0db63 0%, transparent 20%),
        linear-gradient(160deg, #2a114e, #3a1867 45%, #2a124e);
      background-size: cover, cover, auto, auto, auto;
      background-position: center, center, center, center, center;
      background-attachment: fixed, fixed, fixed, fixed, fixed;
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(1000px, 92vw);
      margin: 2rem auto 3rem;
    }

    .title {
      margin: 0 0 .35rem;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 800;
    }

    .subtitle {
      margin: 0 0 1.2rem;
      color: var(--muted);
      font-size: .95rem;
    }

    .grid {
      display: grid;
      gap: 1rem;
    }

    .card {
      background: linear-gradient(165deg, color-mix(in oklab, var(--card), black 6%), color-mix(in oklab, var(--card-2), black 4%));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 10px 28px rgba(13, 2, 33, .45);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 34px rgba(13, 2, 33, .5);
      border-color: #8f67cb;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: .7rem;
    }

    input, select, button, textarea {
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: .65rem .75rem;
      background: color-mix(in oklab, #2f1453, black 12%);
      color: var(--text);
      font-size: .92rem;
    }

    textarea {
      resize: vertical;
      min-height: 72px;
      max-height: 180px;
    }

    input::placeholder, textarea::placeholder { color: #7380aa; }
    input:focus, select:focus, button:focus, textarea:focus {
      outline: 2px solid color-mix(in oklab, var(--accent), white 15%);
      outline-offset: 1px;
    }

    button {
      cursor: pointer;
      background: linear-gradient(180deg, #ffd95a, #efbe2c);
      border-color: #d8a720;
      color: #3a175f;
      font-weight: 700;
      transition: .2s ease;
    }

    button:hover { filter: brightness(1.06); transform: translateY(-2px) scale(1.01); }

    .full { grid-column: span 2; }
    .full-row { grid-column: 1 / -1; }
    .actions {
      display: flex;
      gap: .6rem;
      align-items: end;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: .7rem;
      margin-top: .2rem;
    }

    .kpi {
      background: color-mix(in oklab, #2f1453, black 10%);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: .85rem .9rem;
    }

    .kpi .label { color: var(--muted); font-size: .8rem; }
    .kpi .value { margin-top: .35rem; font-size: 1.2rem; font-weight: 700; }

    .toolbar {
      display: grid;
      grid-template-columns: 1.5fr .8fr .8fr auto;
      gap: .7rem;
      align-items: center;
    }

    .study-log-grid {
      display: grid;
      grid-template-columns: 1fr 170px 170px auto;
      gap: .7rem;
      align-items: end;
    }

    .study-log-list {
      margin: .8rem 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: .55rem;
    }

    .study-log-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: color-mix(in oklab, #2b0f4f, black 8%);
      padding: .65rem .75rem;
      display: flex;
      justify-content: space-between;
      gap: .75rem;
      align-items: flex-start;
    }

    .study-log-text {
      display: grid;
      gap: .25rem;
      color: #d6ddf5;
      font-size: .86rem;
      line-height: 1.4;
    }

    .task-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: .6rem;
    }

    .task {
      border: 1px solid var(--line);
      background: color-mix(in oklab, #32165a, black 8%);
      border-radius: 12px;
      padding: .8rem;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: .75rem;
      align-items: start;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .task:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(10, 2, 28, .35);
    }

    .task.done {
      opacity: .65;
      background: color-mix(in oklab, #254f48, #2e1453 55%);
      border-color: #3fa090;
    }

    .task-main {
      display: flex;
      flex-direction: column;
      gap: .35rem;
    }

    .task-title {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
      line-height: 1.35;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      color: var(--muted);
      font-size: .82rem;
    }

    .task-note {
      margin: .2rem 0 0;
      color: #f2dfff;
      font-size: .88rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tag {
      border: 1px solid var(--line);
      padding: .2rem .45rem;
      border-radius: 999px;
      background: color-mix(in oklab, #2d1350, black 5%);
    }

    .tag.high { border-color: #f29db5; color: #ffd2de; }
    .tag.medium { border-color: #d8b04d; color: #ffe9aa; }
    .tag.low { border-color: #6bc3aa; color: #c9f6e6; }

    .task-actions {
      display: flex;
      gap: .45rem;
      align-items: center;
    }

    .ghost {
      background: color-mix(in oklab, #3a1a63, black 4%);
      color: #ffefb4;
      border-color: #a67bd8;
    }
    .danger {
      background: linear-gradient(180deg, #ff9aae, #ef6f90);
      border-color: #da4e76;
      color: #410825;
    }
    .muted { color: var(--muted); }
    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .9rem;
    }

    .chart-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: color-mix(in oklab, #2f1453, black 8%);
      padding: .75rem;
    }

    .chart-title {
      margin: 0 0 .6rem;
      font-size: .9rem;
      color: #ffe9a9;
      font-weight: 700;
    }

    .bar-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: .5rem;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 70px 1fr 52px;
      gap: .5rem;
      align-items: center;
      font-size: .82rem;
      color: #f5e8ff;
    }

    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: color-mix(in oklab, #2d104d, black 16%);
      overflow: hidden;
      border: 1px solid #6d4e9a;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffe372, #f9c62d);
      animation: barGrow .45s ease both;
    }

    .bg-panel {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: .6rem;
      align-items: center;
    }

    .bg-help {
      margin: 0;
      color: var(--muted);
      font-size: .82rem;
    }

    .auth-card {
      border: 1px solid #8f67cb;
      background: linear-gradient(165deg, #4a2678, #3a1c64);
    }

    .auth-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: .65rem;
      align-items: end;
    }

    .auth-actions {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .google-btn {
      background: linear-gradient(180deg, #fff6c7, #ffd95a);
      color: #3a175f;
      border-color: #e2bc45;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .3rem .6rem;
      border-radius: 999px;
      border: 1px solid #9b7ecb;
      background: color-mix(in oklab, #301553, black 5%);
      color: #ffe9a9;
      font-size: .82rem;
      margin-top: .6rem;
    }

    @keyframes barGrow {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .task, .study-log-item, .kpi, .chart-box {
      animation: fadeInUp .25s ease both;
    }


    .empty {
      text-align: center;
      color: var(--muted);
      padding: 1rem .4rem;
      border: 1px dashed var(--line);
      border-radius: 10px;
    }

    @media (max-width: 900px) {
      .input-grid { grid-template-columns: 1fr 1fr; }
      .auth-grid { grid-template-columns: 1fr 1fr; }
      .full { grid-column: span 2; }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .study-log-grid { grid-template-columns: 1fr 1fr; }
      .kpis { grid-template-columns: 1fr 1fr; }
      .charts { grid-template-columns: 1fr; }
      .bg-panel { grid-template-columns: 1fr; }
    }

    @media (max-width: 620px) {
      .task { grid-template-columns: auto 1fr; }
      .task-actions { grid-column: 1 / -1; justify-content: end; }
      .bar-row {
        grid-template-columns: 56px 1fr 48px;
        font-size: .76rem;
        gap: .35rem;
      }
      .bar-track { height: 12px; }
      .chart-title { font-size: .95rem; }
    }
  </style>
</head>
<body>
  <main class="container grid">
    <section>
      <h1 class="title">Campus Tasks</h1>
      <p class="subtitle">대학생을 위한 과제 관리 앱 · 브라우저에 자동 저장됩니다.</p>
    </section>

    <section class="card auth-card">
      <h2>로그인</h2>
      <div class="auth-grid">
        <input id="emailInput" type="email" placeholder="이메일">
        <input id="passwordInput" type="password" placeholder="비밀번호 (6자 이상)">
        <div class="auth-actions full">
          <button id="loginBtn" type="button">이메일 로그인</button>
          <button id="signupBtn" class="ghost" type="button">이메일 회원가입</button>
          <button id="googleLoginBtn" class="google-btn" type="button">Google 로그인</button>
          <button id="logoutBtn" class="danger" type="button">로그아웃</button>
        </div>
      </div>
      <p id="authMessage" class="status-chip">로그인 후 과제를 저장할 수 있어요.</p>
    </section>

    <div id="appContent" class="grid">
    <section class="card">
      <h2>배경화면 설정</h2>
      <div class="bg-panel">
        <input id="bgImageInput" type="file" accept="image/*">
        <button id="applyBgBtn" type="button">배경 적용</button>
        <button id="resetBgBtn" class="ghost" type="button">기본 배경</button>
      </div>
      <p class="bg-help">원하는 이미지를 올리면 앱 배경으로 바로 반영되고, 다음 접속에도 유지됩니다.</p>
    </section>

    <section class="card">
      <h2>과제 추가</h2>
      <div class="input-grid">
        <input id="titleInput" class="full" type="text" placeholder="과제명 (예: 자료구조 4주차 보고서)">
        <input id="courseInput" type="text" placeholder="과목명">
        <input id="dueInput" type="date">
        <select id="priorityInput">
          <option value="high">우선순위: 높음</option>
          <option value="medium" selected>우선순위: 보통</option>
          <option value="low">우선순위: 낮음</option>
        </select>
        <div class="actions">
          <button id="addBtn" type="button">추가</button>
          <button id="clearDoneBtn" class="ghost" type="button">완료 항목 삭제</button>
        </div>
        <textarea id="noteInput" class="full-row" placeholder="세부 참고 사항 메모 (예: 교수님 코멘트, 참고 링크, 제출 형식)"></textarea>
      </div>
    </section>

    <section class="card">
      <h2>학습 기록</h2>
      <div class="study-log-grid">
        <select id="studyTaskInput">
          <option value="">과제 선택 (선택사항)</option>
        </select>
        <input id="studyDateInput" type="date">
        <input id="studyHoursInput" type="number" min="0.5" step="0.5" placeholder="공부 시간(h)">
        <button id="addStudyLogBtn" type="button">기록 추가</button>
        <textarea id="studyMemoInput" class="full-row" placeholder="오늘 무엇을 했는지 간단히 기록하세요."></textarea>
      </div>
      <ul id="studyLogList" class="study-log-list"></ul>
    </section>

    <section class="card">
      <div class="kpis">
        <article class="kpi">
          <div class="label">총 과제</div>
          <div id="totalKpi" class="value">0</div>
        </article>
        <article class="kpi">
          <div class="label">진행 중</div>
          <div id="activeKpi" class="value">0</div>
        </article>
        <article class="kpi">
          <div class="label">완료</div>
          <div id="doneKpi" class="value">0</div>
        </article>
        <article class="kpi">
          <div class="label">마감 임박(3일)</div>
          <div id="urgentKpi" class="value">0</div>
        </article>
        <article class="kpi">
          <div class="label">총 소요 시간</div>
          <div id="hoursKpi" class="value">0h</div>
        </article>
      </div>
    </section>

    <section class="card">
      <h2>학습 시간 분석</h2>
      <div class="charts">
        <article class="chart-box">
          <h3 class="chart-title">최근 7일</h3>
          <ul id="weeklyChart" class="bar-list"></ul>
        </article>
        <article class="chart-box">
          <h3 class="chart-title">최근 6개월</h3>
          <ul id="monthlyChart" class="bar-list"></ul>
        </article>
      </div>
    </section>

    <section class="card grid">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="과제명/과목명 검색">
        <select id="statusFilter">
          <option value="all">상태: 전체</option>
          <option value="active">상태: 진행 중</option>
          <option value="done">상태: 완료</option>
        </select>
        <select id="sortBy">
          <option value="due">정렬: 마감일 빠른 순</option>
          <option value="priority">정렬: 우선순위 높은 순</option>
          <option value="created">정렬: 최신 추가 순</option>
        </select>
        <span id="countText" class="muted">0개 표시</span>
      </div>
      <ul id="taskList" class="task-list"></ul>
    </section>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script>
    const STORAGE_KEY_BASE = "campus_tasks_v1";
    const STUDY_LOGS_KEY_BASE = "campus_study_logs_v1";
    const BG_IMAGE_KEY_BASE = "campus_background_image_v1";
    const PRIORITY_SCORE = { high: 3, medium: 2, low: 1 };
    const PRIORITY_LABEL = { high: "높음", medium: "보통", low: "낮음" };
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyBQqLo6WNuzrnbGw1j5uSA1r3mET6aYJaI",
      authDomain: "appa-5a6e8.firebaseapp.com",
      projectId: "appa-5a6e8",
      appId: "1:292901570204:web:c0ee77e2ac03ebb8b38f59"
    };

    const els = {
      appContent: document.getElementById("appContent"),
      emailInput: document.getElementById("emailInput"),
      passwordInput: document.getElementById("passwordInput"),
      loginBtn: document.getElementById("loginBtn"),
      signupBtn: document.getElementById("signupBtn"),
      googleLoginBtn: document.getElementById("googleLoginBtn"),
      logoutBtn: document.getElementById("logoutBtn"),
      authMessage: document.getElementById("authMessage"),
      titleInput: document.getElementById("titleInput"),
      courseInput: document.getElementById("courseInput"),
      dueInput: document.getElementById("dueInput"),
      priorityInput: document.getElementById("priorityInput"),
      noteInput: document.getElementById("noteInput"),
      studyTaskInput: document.getElementById("studyTaskInput"),
      studyDateInput: document.getElementById("studyDateInput"),
      studyHoursInput: document.getElementById("studyHoursInput"),
      studyMemoInput: document.getElementById("studyMemoInput"),
      addStudyLogBtn: document.getElementById("addStudyLogBtn"),
      studyLogList: document.getElementById("studyLogList"),
      weeklyChart: document.getElementById("weeklyChart"),
      monthlyChart: document.getElementById("monthlyChart"),
      bgImageInput: document.getElementById("bgImageInput"),
      applyBgBtn: document.getElementById("applyBgBtn"),
      resetBgBtn: document.getElementById("resetBgBtn"),
      addBtn: document.getElementById("addBtn"),
      clearDoneBtn: document.getElementById("clearDoneBtn"),
      searchInput: document.getElementById("searchInput"),
      statusFilter: document.getElementById("statusFilter"),
      sortBy: document.getElementById("sortBy"),
      taskList: document.getElementById("taskList"),
      countText: document.getElementById("countText"),
      totalKpi: document.getElementById("totalKpi"),
      activeKpi: document.getElementById("activeKpi"),
      doneKpi: document.getElementById("doneKpi"),
      urgentKpi: document.getElementById("urgentKpi"),
      hoursKpi: document.getElementById("hoursKpi")
    };

    let auth = null;
    let currentUid = null;
    let tasks = loadTasks();
    let studyLogs = loadStudyLogs();

    function scopedKey(base) {
      return `${base}_${currentUid || "guest"}`;
    }

    function setAuthMessage(message) {
      els.authMessage.textContent = message;
    }

    function updateAppInteractivity() {
      const enabled = Boolean(currentUid);
      els.appContent.style.opacity = enabled ? "1" : ".45";
      els.appContent.style.pointerEvents = enabled ? "auto" : "none";
    }

    function requireAuth() {
      if (currentUid) return true;
      setAuthMessage("먼저 로그인해주세요. 로그인 후 데이터가 계정별로 저장됩니다.");
      return false;
    }

    function loadTasks() {
      try {
        const raw = localStorage.getItem(scopedKey(STORAGE_KEY_BASE));
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(scopedKey(STORAGE_KEY_BASE), JSON.stringify(tasks));
    }

    function loadStudyLogs() {
      try {
        const raw = localStorage.getItem(scopedKey(STUDY_LOGS_KEY_BASE));
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveStudyLogs() {
      localStorage.setItem(scopedKey(STUDY_LOGS_KEY_BASE), JSON.stringify(studyLogs));
    }

    function applyBackground(imageData) {
      if (!imageData) {
        document.body.style.setProperty("--user-bg", "none");
        return;
      }
      document.body.style.setProperty("--user-bg", `url("${imageData}")`);
    }

    function loadBackground() {
      const stored = localStorage.getItem(scopedKey(BG_IMAGE_KEY_BASE));
      if (stored) applyBackground(stored);
      else applyBackground("");
    }

    function setCustomBackground() {
      if (!requireAuth()) return;
      const file = els.bgImageInput.files && els.bgImageInput.files[0];
      if (!file) {
        alert("배경으로 사용할 이미지를 먼저 선택해주세요.");
        return;
      }
      if (!file.type.startsWith("image/")) {
        alert("이미지 파일만 업로드할 수 있어요.");
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        const imageData = typeof reader.result === "string" ? reader.result : "";
        if (!imageData) return;
        localStorage.setItem(scopedKey(BG_IMAGE_KEY_BASE), imageData);
        applyBackground(imageData);
      };
      reader.readAsDataURL(file);
    }

    function resetBackground() {
      if (!requireAuth()) return;
      localStorage.removeItem(scopedKey(BG_IMAGE_KEY_BASE));
      applyBackground("");
      els.bgImageInput.value = "";
    }

    function formatDue(dateStr) {
      if (!dateStr) return "마감일 없음";
      const date = new Date(dateStr + "T00:00:00");
      if (Number.isNaN(date.getTime())) return "마감일 없음";
      return date.toLocaleDateString("ko-KR", { year: "numeric", month: "short", day: "numeric" });
    }

    function daysLeft(dateStr) {
      if (!dateStr) return null;
      const due = new Date(dateStr + "T00:00:00");
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      if (Number.isNaN(due.getTime())) return null;
      return Math.floor((due - today) / (1000 * 60 * 60 * 24));
    }

    function dueBadge(task) {
      const left = daysLeft(task.dueDate);
      if (left === null) return "마감일 미정";
      if (left < 0) return `마감 지남 ${Math.abs(left)}일`;
      if (left === 0) return "오늘 마감";
      return `${left}일 남음`;
    }

    function addTask() {
      if (!requireAuth()) return;
      const title = els.titleInput.value.trim();
      const course = els.courseInput.value.trim();
      const dueDate = els.dueInput.value;
      const priority = els.priorityInput.value;
      const note = els.noteInput.value.trim();

      if (!title) {
        alert("과제명을 입력해주세요.");
        els.titleInput.focus();
        return;
      }

      const task = {
        id: crypto.randomUUID(),
        title,
        course: course || "과목 미지정",
        dueDate,
        priority,
        note,
        done: false,
        createdAt: Date.now()
      };

      tasks.unshift(task);
      saveTasks();
      clearInputs();
      render();
    }

    function clearInputs() {
      els.titleInput.value = "";
      els.courseInput.value = "";
      els.dueInput.value = "";
      els.priorityInput.value = "medium";
      els.noteInput.value = "";
      els.titleInput.focus();
    }

    function clearStudyLogInputs() {
      els.studyTaskInput.value = "";
      els.studyHoursInput.value = "";
      els.studyMemoInput.value = "";
      els.studyDateInput.value = new Date().toISOString().slice(0, 10);
    }

    function addStudyLog() {
      if (!requireAuth()) return;
      const taskId = els.studyTaskInput.value;
      const date = els.studyDateInput.value;
      const hours = Number(els.studyHoursInput.value);
      const memo = els.studyMemoInput.value.trim();

      if (!date) {
        alert("기록 날짜를 선택해주세요.");
        els.studyDateInput.focus();
        return;
      }
      if (!Number.isFinite(hours) || hours <= 0) {
        alert("공부 시간을 올바르게 입력해주세요.");
        els.studyHoursInput.focus();
        return;
      }

      const linkedTask = tasks.find(task => task.id === taskId);
      studyLogs.unshift({
        id: crypto.randomUUID(),
        taskId: linkedTask ? linkedTask.id : "",
        taskTitle: linkedTask ? linkedTask.title : "자율 학습",
        date,
        hours,
        memo,
        createdAt: Date.now()
      });

      saveStudyLogs();
      clearStudyLogInputs();
      render();
    }

    function deleteStudyLog(id) {
      if (!requireAuth()) return;
      studyLogs = studyLogs.filter(log => log.id !== id);
      saveStudyLogs();
      render();
    }

    function toggleTask(id) {
      if (!requireAuth()) return;
      tasks = tasks.map(task => task.id === id ? { ...task, done: !task.done } : task);
      saveTasks();
      render();
    }

    function deleteTask(id) {
      if (!requireAuth()) return;
      tasks = tasks.filter(task => task.id !== id);
      saveTasks();
      render();
    }

    function clearDoneTasks() {
      if (!requireAuth()) return;
      const doneCount = tasks.filter(task => task.done).length;
      if (!doneCount) return;
      if (!confirm(`완료된 ${doneCount}개 과제를 삭제할까요?`)) return;
      tasks = tasks.filter(task => !task.done);
      saveTasks();
      render();
    }

    function getFilteredTasks() {
      const query = els.searchInput.value.trim().toLowerCase();
      const status = els.statusFilter.value;
      const sortBy = els.sortBy.value;

      let result = tasks.filter(task => {
        const matchesQuery = !query ||
          task.title.toLowerCase().includes(query) ||
          task.course.toLowerCase().includes(query);
        const matchesStatus =
          status === "all" ||
          (status === "active" && !task.done) ||
          (status === "done" && task.done);
        return matchesQuery && matchesStatus;
      });

      result.sort((a, b) => {
        if (sortBy === "priority") {
          const p = PRIORITY_SCORE[b.priority] - PRIORITY_SCORE[a.priority];
          return p !== 0 ? p : a.createdAt - b.createdAt;
        }
        if (sortBy === "created") return b.createdAt - a.createdAt;

        const aDue = a.dueDate ? new Date(a.dueDate + "T00:00:00").getTime() : Number.POSITIVE_INFINITY;
        const bDue = b.dueDate ? new Date(b.dueDate + "T00:00:00").getTime() : Number.POSITIVE_INFINITY;
        if (aDue !== bDue) return aDue - bDue;
        return b.createdAt - a.createdAt;
      });

      return result;
    }

    function updateKpis() {
      const total = tasks.length;
      const done = tasks.filter(task => task.done).length;
      const active = total - done;
      const urgent = tasks.filter(task => !task.done).filter(task => {
        const left = daysLeft(task.dueDate);
        return left !== null && left <= 3;
      }).length;
      const totalHours = studyLogs.reduce((sum, log) => sum + (Number(log.hours) || 0), 0);

      els.totalKpi.textContent = String(total);
      els.activeKpi.textContent = String(active);
      els.doneKpi.textContent = String(done);
      els.urgentKpi.textContent = String(urgent);
      els.hoursKpi.textContent = `${totalHours}h`;
    }

    function renderStudyTaskOptions() {
      const previous = els.studyTaskInput.value;
      const options = ['<option value="">과제 선택 (선택사항)</option>']
        .concat(tasks.map(task => `<option value="${task.id}">${escapeHtml(task.title)}</option>`));
      els.studyTaskInput.innerHTML = options.join("");
      if (previous && tasks.some(task => task.id === previous)) {
        els.studyTaskInput.value = previous;
      }
    }

    function renderStudyLogs() {
      els.studyLogList.innerHTML = "";
      if (!studyLogs.length) {
        const li = document.createElement("li");
        li.className = "empty";
        li.textContent = "아직 학습 기록이 없습니다. 오늘 공부한 시간을 기록해보세요.";
        els.studyLogList.appendChild(li);
        return;
      }

      for (const log of studyLogs.slice(0, 12)) {
        const li = document.createElement("li");
        li.className = "study-log-item";
        li.innerHTML = `
          <div class="study-log-text">
            <strong>${escapeHtml(log.taskTitle || "자율 학습")}</strong>
            <span>${formatDue(log.date)} · ${Number(log.hours) || 0}h</span>
            ${log.memo ? `<span>${escapeHtml(log.memo)}</span>` : ""}
          </div>
          <button class="danger" type="button">삭제</button>
        `;
        const delBtn = li.querySelector("button");
        delBtn.addEventListener("click", () => deleteStudyLog(log.id));
        els.studyLogList.appendChild(li);
      }
    }

    function formatShortDate(date) {
      return date.toLocaleDateString("ko-KR", { month: "numeric", day: "numeric" });
    }

    function formatMonthKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function renderBarChart(container, entries) {
      container.innerHTML = "";
      if (!entries.length) {
        const li = document.createElement("li");
        li.className = "empty";
        li.textContent = "표시할 학습 기록이 없습니다.";
        container.appendChild(li);
        return;
      }

      const max = Math.max(...entries.map(entry => entry.hours), 1);
      for (const entry of entries) {
        const li = document.createElement("li");
        li.className = "bar-row";
        const pct = Math.round((entry.hours / max) * 100);
        li.innerHTML = `
          <span>${escapeHtml(entry.label)}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          <strong>${entry.hours}h</strong>
        `;
        container.appendChild(li);
      }
    }

    function renderAnalytics() {
      const byDay = new Map();
      const byMonth = new Map();

      for (const log of studyLogs) {
        const date = new Date(log.date + "T00:00:00");
        if (Number.isNaN(date.getTime())) continue;
        const dayKey = date.toISOString().slice(0, 10);
        byDay.set(dayKey, (byDay.get(dayKey) || 0) + (Number(log.hours) || 0));
        const monthKey = formatMonthKey(date);
        byMonth.set(monthKey, (byMonth.get(monthKey) || 0) + (Number(log.hours) || 0));
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const weeklyEntries = [];
      for (let i = 6; i >= 0; i -= 1) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        weeklyEntries.push({
          label: formatShortDate(d),
          hours: Number((byDay.get(key) || 0).toFixed(1))
        });
      }

      const monthlyEntries = [];
      const start = new Date(today.getFullYear(), today.getMonth(), 1);
      for (let i = 5; i >= 0; i -= 1) {
        const d = new Date(start.getFullYear(), start.getMonth() - i, 1);
        const key = formatMonthKey(d);
        monthlyEntries.push({
          label: `${d.getMonth() + 1}월`,
          hours: Number((byMonth.get(key) || 0).toFixed(1))
        });
      }

      renderBarChart(els.weeklyChart, weeklyEntries);
      renderBarChart(els.monthlyChart, monthlyEntries);
    }

    function render() {
      const view = getFilteredTasks();
      els.taskList.innerHTML = "";

      if (!view.length) {
        const li = document.createElement("li");
        li.className = "empty";
        li.textContent = tasks.length
          ? "필터 조건에 맞는 과제가 없습니다."
          : "아직 등록된 과제가 없습니다. 첫 과제를 추가해보세요.";
        els.taskList.appendChild(li);
      } else {
        for (const task of view) {
          const li = document.createElement("li");
          li.className = `task${task.done ? " done" : ""}`;
          li.innerHTML = `
            <input type="checkbox" aria-label="완료 체크" ${task.done ? "checked" : ""}>
            <div class="task-main">
              <p class="task-title">${escapeHtml(task.title)}</p>
              <div class="task-meta">
                <span class="tag">${escapeHtml(task.course)}</span>
                <span class="tag ${task.priority}">우선순위 ${PRIORITY_LABEL[task.priority]}</span>
                <span class="tag">${formatDue(task.dueDate)}</span>
                <span class="tag">${dueBadge(task)}</span>
              </div>
              ${task.note ? `<p class="task-note">메모: ${escapeHtml(task.note)}</p>` : ""}
            </div>
            <div class="task-actions">
              <button class="ghost">${task.done ? "되돌리기" : "완료"}</button>
              <button class="danger">삭제</button>
            </div>
          `;

          const [checkbox] = li.querySelectorAll("input[type='checkbox']");
          const [toggleBtn, delBtn] = li.querySelectorAll(".task-actions button");

          checkbox.addEventListener("change", () => toggleTask(task.id));
          toggleBtn.addEventListener("click", () => toggleTask(task.id));
          delBtn.addEventListener("click", () => deleteTask(task.id));

          els.taskList.appendChild(li);
        }
      }

      renderStudyTaskOptions();
      renderStudyLogs();
      renderAnalytics();
      els.countText.textContent = `${view.length}개 표시`;
      updateKpis();
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[c]);
    }

    async function signUpWithEmail() {
      const email = els.emailInput.value.trim();
      const password = els.passwordInput.value.trim();
      if (!email || !password) {
        setAuthMessage("이메일과 비밀번호를 입력해주세요.");
        return;
      }
      try {
        await auth.createUserWithEmailAndPassword(email, password);
        setAuthMessage("회원가입 완료! 자동으로 로그인되었습니다.");
      } catch (error) {
        setAuthMessage(`회원가입 실패: ${error.message}`);
      }
    }

    async function signInWithEmail() {
      const email = els.emailInput.value.trim();
      const password = els.passwordInput.value.trim();
      if (!email || !password) {
        setAuthMessage("이메일과 비밀번호를 입력해주세요.");
        return;
      }
      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch (error) {
        setAuthMessage(`로그인 실패: ${error.message}`);
      }
    }

    async function signInWithGoogle() {
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithPopup(provider);
      } catch (error) {
        setAuthMessage(`Google 로그인 실패: ${error.message}`);
      }
    }

    async function signOutUser() {
      try {
        await auth.signOut();
      } catch (error) {
        setAuthMessage(`로그아웃 실패: ${error.message}`);
      }
    }

    function initFirebaseAuth() {
      try {
        firebase.initializeApp(FIREBASE_CONFIG);
        auth = firebase.auth();
      } catch (error) {
        setAuthMessage("Firebase 설정값을 먼저 채워주세요. 아래 안내를 따라주세요.");
        return;
      }

      auth.onAuthStateChanged((user) => {
        currentUid = user ? user.uid : null;
        tasks = loadTasks();
        studyLogs = loadStudyLogs();
        updateAppInteractivity();
        loadBackground();
        clearStudyLogInputs();
        render();

        if (user) {
          const name = user.displayName || user.email || "사용자";
          setAuthMessage(`${name} 님 로그인됨`);
        } else {
          setAuthMessage("로그인 후 과제를 저장할 수 있어요.");
        }
      });
    }

    initFirebaseAuth();
    els.addBtn.addEventListener("click", addTask);
    els.clearDoneBtn.addEventListener("click", clearDoneTasks);
    els.searchInput.addEventListener("input", render);
    els.statusFilter.addEventListener("change", render);
    els.sortBy.addEventListener("change", render);
    els.addStudyLogBtn.addEventListener("click", addStudyLog);
    els.applyBgBtn.addEventListener("click", setCustomBackground);
    els.resetBgBtn.addEventListener("click", resetBackground);
    els.loginBtn.addEventListener("click", signInWithEmail);
    els.signupBtn.addEventListener("click", signUpWithEmail);
    els.googleLoginBtn.addEventListener("click", signInWithGoogle);
    els.logoutBtn.addEventListener("click", signOutUser);
    els.titleInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTask();
    });

    clearStudyLogInputs();
    updateAppInteractivity();
    render();
  </script>
</body>
</html>
